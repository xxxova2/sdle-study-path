<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#141820" />
    <meta name="description" content="Free KSA SDLE study path — readings, MCQs, plans. Open source." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SDLE" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <title>SDLE Study Path — KSA</title>
    <!-- Substack-like longform: Spectral (falls back offline to Charter/Georgia) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap"
      rel="stylesheet"
    />
    <!-- ?v= busts CDN/browser cache after feedback fix -->
    <link rel="stylesheet" href="css/app.css?v=20260720k" />
  </head>
  <body class="path-app simple-ui">
    <header class="topbar simple" id="topbar">
      <div class="chrome-row">
        <div class="logo" title="SDLE Study Path">
          <span class="logo-text">SDLE</span>
        </div>
        <div class="top-stats" id="top-stats" hidden></div>
        <div id="pomo-bar" class="pomo-bar" aria-label="Focus timer" hidden></div>
      </div>
      <!-- paintMainNav() fills this: Simple = 4 tabs; Coach = full set -->
      <nav class="nav simple-nav" id="main-nav" aria-label="Main plan tabs">
        <button type="button" data-view="today" class="active" title="Today’s lesson">Today</button>
        <button type="button" data-view="practice" title="أبطال · رفيع · MCQs">Practice</button>
        <button type="button" data-view="notes" title="Notes by department">Notes</button>
        <button type="button" data-view="progress" title="Scores & settings">Progress</button>
      </nav>
    </header>

    <main class="path-main" id="app"></main>

    <footer class="foot">
      Free SDLE ·
      <a href="https://github.com/xxxova2/sdle-study-path" target="_blank" rel="noopener">Source</a>
      ·
      <a href="https://github.com/xxxova2/sdle-study-path/blob/main/docs/INTRO_POST_EN_AR.md" target="_blank" rel="noopener">Intro</a>
    </footer>

    <script src="data/highyield.js?v=20260720k"></script>
    <script src="data/scfhs_refs.js?v=20260720k"></script>
    <script src="data/plan_tracks.js?v=20260720k"></script>
    <script src="data/video_links.js?v=20260720k"></script>
    <script src="data/book_index.js?v=20260720k"></script>
    <script src="data/exam_packs.js?v=20260720k"></script>
    <script src="data/notes_bank.js?v=20260720k"></script>
    <script src="data/lessons.js?v=20260720k"></script>
    <script src="data/questions.js?v=20260720k"></script>
    <script src="data/feedback_config.js?v=20260720k"></script>
    <script src="js/app.js?v=20260720k"></script>
  </body>
</html>
